services:
  # Servicio Web
  - type: web
    name: reclutamiento-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      # Variables de entorno para producción
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      - key: SESSION_COOKIE_SECURE
        value: true
      # Base de datos (Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: reclutamiento-db
          property: connectionString

  # Base de Datos PostgreSQL
  - type: postgres
    name: reclutamiento-db
    plan: free
    ipAllowList: []  # Solo accesible desde el servicio web

version: "1"
