version: "1"

# BASE DE DATOS (sección aparte, NO dentro de services)
databases:
  - name: reclutamiento-db
    databaseName: reclutamiento_db
    user: reclutamiento_user
    plan: free
    region: oregon

# SERVICIOS (solo aplicaciones web, workers, etc.)
services:
  - type: web
    name: reclutamiento-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt && chmod +x start.sh"
    startCommand: "./start.sh"
    healthCheckPath: /api/health
    
    envVars:
      - key: FLASK_ENV
        value: production
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: reclutamiento-db
          property: connectionString