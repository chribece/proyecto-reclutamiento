version: "1"

# BASE DE DATOS (sección aparte, NO dentro de services)
databases:
  - name: reclutamiento-db
    databaseName: reclutamiento_db
    user: reclutamiento_user
    plan: free
    region: oregon

# SERVICIOS (solo aplicaciones web, workers, etc.)
services:
  - type: web
    name: reclutamiento-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python init_produccion.py && gunicorn app:app"  # Inicializa y luego inicia Gunicorn
    healthCheckPath: /api/health  # Importante para que Render sepa que está listo
    
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      
      # Conexión automática a la base de datos
      - key: DATABASE_URL
        fromDatabase:
          name: reclutamiento-db
          property: connectionString
      
      # Variable para que el script sepa que está en Render
      - key: RENDER
        value: "true"